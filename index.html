<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio ASCII - Professor Fernando</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #f0f2f5; padding: 20px; }
        .card { background: white; max-width: 800px; margin: 0 auto; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #333; margin-bottom: 10px; }
        #target-char { color: #d32f2f; font-size: 6rem; font-weight: bold; margin: 0; }
        #char-hint { font-size: 1.2rem; color: #666; margin-bottom: 20px; }
        
        .container { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 30px; }
        .bit-control { display: flex; flex-direction: column; align-items: center; width: 70px; }
        .lamp-img { width: 100%; cursor: pointer; transition: 0.1s; }
        .lamp-img:active { transform: scale(0.9); }
        .weight { font-size: 0.9rem; margin-top: 10px; color: #444; font-weight: bold; }
        
        button { padding: 12px 25px; font-size: 1.1rem; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; margin: 10px; transition: 0.3s; }
        #btn-check { background-color: #2e7d32; color: white; }
        #btn-reset { background-color: #1976d2; color: white; }
        #message { margin-top: 25px; font-size: 1.5rem; font-weight: bold; min-height: 2.5rem; }
    </style>
</head>
<body>

<div class="card">
    <h2>Qual o código binário da letra:</h2>
    <div id="target-char">A</div>
    <div id="char-hint">(Dica: O valor decimal desta letra é <span id="decimal-val"></span>)</div>

    <div class="container" id="lamps-container"></div>

    <div>
        <button id="btn-check" onclick="checkAnswer()">Validar Caractere</button>
        <button id="btn-reset" onclick="initGame()">Sortear Nova Letra</button>
    </div>

    <div id="message"></div>
</div>

<script>
    let currentDecimal = 0;
    const totalBits = 8; // 1 Byte para ASCII
    const imgOn = 'lamp_on.png';
    const imgOff = 'lamp_off.png';

    function initGame() {
        // Sorteia uma letra maiúscula (ASCII 65 a 90)
        currentDecimal = Math.floor(Math.random() * (90 - 65 + 1)) + 65;
        const char = String.fromCharCode(currentDecimal);
        
        document.getElementById('target-char').innerText = char;
        document.getElementById('decimal-val').innerText = currentDecimal;
        document.getElementById('message').innerText = "";
        
        const container = document.getElementById('lamps-container');
        container.innerHTML = "";

        for (let i = totalBits - 1; i >= 0; i--) {
            const val = Math.pow(2, i);
            const div = document.createElement('div');
            div.className = 'bit-control';
            div.innerHTML = `
                <img src="${imgOff}" class="lamp-img" id="lamp-${i}" data-state="off" onclick="toggleLamp(${i})">
                <div class="weight">${val}</div>
            `;
            container.appendChild(div);
        }
    }

    function toggleLamp(index) {
        const lamp = document.getElementById(`lamp-${index}`);
        const isOn = lamp.getAttribute('data-state') === 'on';
        lamp.src = isOn ? imgOff : imgOn;
        lamp.setAttribute('data-state', isOn ? 'off' : 'on');
    }

    function checkAnswer() {
        let total = 0;
        for (let i = 0; i < totalBits; i++) {
            if (document.getElementById(`lamp-${i}`).getAttribute('data-state') === 'on') {
                total += Math.pow(2, i);
            }
        }

        const msg = document.getElementById('message');
        if (total === currentDecimal) {
            msg.innerText = "Excelente! Você converteu a letra corretamente! 💡";
            msg.style.color = "#2e7d32";
        } else {
            msg.innerText = `Quase! Você formou o valor ${total}. Tente chegar em ${currentDecimal}.`;
            msg.style.color = "#d32f2f";
        }
    }

    window.onload = initGame;
</script>
</body>
</html>
